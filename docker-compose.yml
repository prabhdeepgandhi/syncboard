version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: --replSet rs0
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7.0
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb --eval
      "try { rs.status() } catch(e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]}) }"
    restart: "no"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/?replicaSet=rs0
      - DATABASE_NAME=syncboard
      - SECRET_KEY=change-me-in-production
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  mongo_data:
